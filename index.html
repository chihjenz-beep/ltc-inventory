<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平安家園 — 活動物品手帳</title>
<meta name="theme-color" content="#ede8df">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="平安家園庫存">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="平安家園長照站活動物品庫存管理系統">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
:root{
  --ink:#1c1410;
  --ink-light:#3d2e22;
  --ink-faint:#6b5a4e;
  --paper:#f7f3ec;
  --paper-warm:#ede8df;
  --paper-deep:#e2dbd0;
  --gold:#b5832a;
  --gold-light:#d4a853;
  --gold-pale:#f0e2c0;
  --red-seal:#8b2020;
  --teal:#2a6b5e;
  --teal-light:#e0efeb;
  --sage:#5a7a5e;
  --sage-light:#e8f0e9;
  --indigo:#2e3d6b;
  --indigo-light:#e4e7f2;
  --rust:#7a3a1e;
  --rust-light:#f0e4dc;
  --plum:#5e2a5a;
  --plum-light:#ede0ec;
  --border:#c8bfaf;
  --border-light:#ddd6c8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--paper);
  color:var(--ink);
  background-image:
    repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(180,160,120,0.08) 27px,rgba(180,160,120,0.08) 28px),
    repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(180,160,120,0.04) 27px,rgba(180,160,120,0.04) 28px);
}
.app{display:flex;height:100vh;max-width:1100px;margin:0 auto;position:relative}

/* === SIDEBAR === */
.sb{
  width:160px;flex-shrink:0;
  background:var(--paper-warm);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:relative;overflow:hidden;
}
.sb::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 18px,rgba(180,150,100,0.06) 18px,rgba(180,150,100,0.06) 19px);
  pointer-events:none;
}
.sb-hd{
  padding:22px 16px 18px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.sb-hd::after{
  content:'';position:absolute;bottom:-1px;left:16px;right:16px;
  height:2px;background:linear-gradient(90deg,var(--gold),transparent);
}
.sb-title{
  font-family:'Noto Serif TC',serif;
  font-size:15px;font-weight:700;
  color:var(--ink);letter-spacing:0.05em;
  line-height:1.3;
}
.sb-sub{
  font-size:10px;color:var(--gold);
  margin-top:4px;letter-spacing:0.12em;
}
.seal{
  width:28px;height:28px;border-radius:3px;
  background:var(--red-seal);
  display:flex;align-items:center;justify-content:center;
  margin-top:10px;
  font-family:'Noto Serif TC',serif;
  font-size:10px;color:#fff;font-weight:700;
  letter-spacing:0;transform:rotate(-3deg);
  box-shadow:1px 1px 0 rgba(0,0,0,0.3);
}
.nsh{
  font-size:9px;color:var(--gold);
  padding:14px 16px 4px;
  letter-spacing:0.18em;text-transform:uppercase;
}
.nav{
  padding:9px 16px;font-size:12px;
  cursor:pointer;color:var(--ink-faint);
  position:relative;
  transition:color 0.2s;
  letter-spacing:0.03em;
  border-left:2px solid transparent;
}
.nav:hover{color:var(--ink);background:rgba(181,131,42,0.06)}
.nav.on{
  color:var(--ink);font-weight:500;
  border-left:2px solid var(--gold);
  background:rgba(181,131,42,0.08);
}
.nav.on::before{
  content:'◆';position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:6px;color:var(--gold);
}
.sb-foot{
  padding:14px 16px;border-top:1px solid var(--border-light);
  margin-top:auto;
}
.sb-foot-txt{font-size:10px;color:var(--gold);letter-spacing:0.1em}
.sb-foot-ver{font-size:9px;color:var(--ink-faint);margin-top:2px}

/* === MAIN === */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

.topbar{
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  background:var(--paper-warm);
  position:relative;
}
.topbar::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:1px;background:linear-gradient(90deg,var(--gold),transparent 60%);
}
.tb-t{
  font-family:'Noto Serif TC',serif;
  font-size:16px;font-weight:500;
  color:var(--ink);flex:1;
  letter-spacing:0.08em;
}
.tb-dot{color:var(--gold);margin-right:6px;font-size:12px}
.srch-wrap{
  position:relative;display:flex;align-items:center;
}
.srch-wrap input{
  border:1px solid var(--border);
  border-radius:0;
  padding:5px 10px 5px 28px;
  font-size:11px;font-family:'Noto Sans TC',sans-serif;
  background:var(--paper);color:var(--ink);
  width:140px;outline:none;
  transition:border-color 0.2s;
}
.srch-wrap input:focus{border-color:var(--gold)}
.srch-icon{position:absolute;left:8px;color:var(--ink-faint);font-size:11px;pointer-events:none}
.scan-btn{
  background:var(--ink);color:var(--paper);
  border:none;border-radius:0;
  padding:6px 14px;font-size:11px;
  font-family:'Noto Sans TC',sans-serif;
  cursor:pointer;letter-spacing:0.08em;
  transition:background 0.2s;
}
.scan-btn:hover{background:var(--gold)}

/* === BODY === */
.body{flex:1;overflow-y:auto;padding:20px}
.body::-webkit-scrollbar{width:4px}
.body::-webkit-scrollbar-track{background:var(--paper-warm)}
.body::-webkit-scrollbar-thumb{background:var(--border)}

/* === STATS === */
.sts{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.st{
  background:var(--paper-warm);
  border:1px solid var(--border-light);
  padding:12px 14px;
  position:relative;overflow:hidden;
}
.st::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold)}
.st-l{font-size:9px;color:var(--gold);letter-spacing:0.15em;margin-bottom:5px}
.st-v{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:700;color:var(--ink)}
.st-v.warn{color:var(--rust)}
.st-v.info{color:var(--indigo)}
.st-v.danger{color:var(--red-seal)}

/* === TABLE === */
.sep{
  font-family:'Noto Serif TC',serif;
  font-size:13px;font-weight:500;
  color:var(--ink);margin:18px 0 10px;
  display:flex;align-items:center;gap:8px;
  padding-bottom:6px;
  border-bottom:1px solid var(--border-light);
  position:relative;
}
.sep::before{content:'◈';color:var(--gold);font-size:11px}
.sep-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border-light),transparent)}

.tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed;margin-bottom:4px}
.tbl th{
  text-align:left;padding:6px 8px;
  border-bottom:1px solid var(--border);
  font-weight:500;color:var(--ink-faint);
  font-size:10px;letter-spacing:0.08em;
  background:var(--paper-warm);
}
.tbl td{
  padding:7px 8px;
  border-bottom:1px solid var(--border-light);
  color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  vertical-align:middle;
}
.tbl tr:hover td{background:rgba(181,131,42,0.04)}

/* === BADGES === */
.b{display:inline-block;font-size:10px;padding:1px 8px;font-weight:500;letter-spacing:0.04em}
.b-ok{background:var(--sage-light);color:var(--sage);border:1px solid rgba(90,122,94,0.25)}
.b-w{background:var(--rust-light);color:var(--rust);border:1px solid rgba(122,58,30,0.25)}
.b-d{background:rgba(139,32,32,0.1);color:var(--red-seal);border:1px solid rgba(139,32,32,0.3)}
.b-c{background:var(--teal-light);color:var(--teal);border:1px solid rgba(42,107,94,0.25)}
.b-n{background:var(--indigo-light);color:var(--indigo);border:1px solid rgba(46,61,107,0.25)}
.b-br{background:var(--gold-pale);color:var(--gold);border:1px solid rgba(181,131,42,0.35)}
.b-u{background:var(--sage-light);color:var(--sage);border:1px solid rgba(90,122,94,0.25)}
.b-in{background:var(--sage-light);color:var(--sage);border:1px solid rgba(90,122,94,0.25)}
.b-rt{background:var(--paper-deep);color:var(--ink-faint);border:1px solid var(--border-light)}
.b-od{background:rgba(139,32,32,0.1);color:var(--red-seal);border:1px solid rgba(139,32,32,0.3)}
.lb{
  display:inline-block;font-size:10px;padding:1px 8px;
  background:var(--paper-deep);color:var(--ink-faint);
  border:1px solid var(--border-light);
  letter-spacing:0.02em;
}
.cat-cog{background:rgba(181,131,42,0.12);color:#7a5a1a;border:1px solid rgba(181,131,42,0.3)}
.cat-ex{background:var(--teal-light);color:var(--teal);border:1px solid rgba(42,107,94,0.25)}
.cat-adl{background:var(--indigo-light);color:var(--indigo);border:1px solid rgba(46,61,107,0.25)}
.cat-art{background:var(--plum-light);color:var(--plum);border:1px solid rgba(94,42,90,0.25)}
.cat-sen{background:rgba(181,131,42,0.1);color:#5a3a10;border:1px solid rgba(181,131,42,0.2)}
.cat-med{background:rgba(139,32,32,0.08);color:var(--red-seal);border:1px solid rgba(139,32,32,0.2)}

/* === ALERT === */
.oa{
  background:rgba(139,32,32,0.07);
  border-left:3px solid var(--red-seal);
  padding:8px 12px;font-size:11px;color:var(--red-seal);
  margin-bottom:14px;letter-spacing:0.02em;
}

/* === FORMS === */
.fl{font-size:11px;color:var(--ink-faint);display:block;margin-bottom:4px;letter-spacing:0.04em}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.cb{
  background:var(--paper-warm);
  border:1px solid var(--border-light);
  border-left:3px solid var(--gold);
  padding:10px 12px;margin-bottom:12px;font-size:12px;
}
.ci{display:flex;justify-content:space-between;padding:3px 0;gap:8px}
.ci span:first-child{color:var(--ink-faint);flex-shrink:0}
.ci span:last-child{color:var(--ink);text-align:right}
input[type=text],input[type=number],input[type=date],select{
  border:1px solid var(--border);border-radius:0;
  padding:7px 10px;font-size:11px;
  font-family:'Noto Sans TC',sans-serif;
  background:var(--paper);color:var(--ink);
  outline:none;width:100%;
  transition:border-color 0.2s;
}
input:focus,select:focus{border-color:var(--gold)}
button{
  border:1px solid var(--border);border-radius:0;
  padding:7px 14px;font-size:11px;
  font-family:'Noto Sans TC',sans-serif;
  background:transparent;color:var(--ink);cursor:pointer;
  letter-spacing:0.04em;transition:all 0.2s;
}
button:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn-primary:hover{background:var(--gold);border-color:var(--gold)}
.row-btn{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}

/* === SCAN/STEP UI === */
.tg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.tc{
  border:1px solid var(--border);
  padding:16px;text-align:center;cursor:pointer;
  background:var(--paper-warm);
  transition:all 0.2s;position:relative;overflow:hidden;
}
.tc::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold);transform:scaleX(0);transition:transform 0.2s}
.tc:hover{border-color:var(--gold);background:var(--gold-pale)}
.tc:hover::before{transform:scaleX(1)}
.ss{
  border:1px dashed var(--border);
  padding:16px;text-align:center;
  margin-bottom:12px;cursor:pointer;
  background:var(--paper-warm);
  transition:all 0.2s;
}
.ss:hover{border-color:var(--gold);background:var(--gold-pale)}
.item-card{
  border:1px solid var(--border-light);
  padding:8px 10px;cursor:pointer;
  background:var(--paper);
  transition:all 0.15s;
}
.item-card:hover{border-color:var(--gold);background:var(--gold-pale);transform:translateY(-1px)}
.success-wrap{text-align:center;padding:40px 20px}
.success-stamp{
  width:70px;height:70px;
  border-radius:50%;border:3px solid var(--sage);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
  font-family:'Noto Serif TC',serif;
  font-size:28px;color:var(--sage);
}

/* === AI BAR === */
.ai-bar{
  padding:8px 20px;
  border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;
  background:var(--paper-warm);
}
.ai-bar input{
  flex:1;border:1px solid var(--border);border-radius:0;
  padding:6px 10px;font-size:11px;
  background:var(--paper);color:var(--ink);outline:none;
  font-family:'Noto Sans TC',sans-serif;
}
.ai-bar input:focus{border-color:var(--gold)}
.ai-bar button{font-size:11px;padding:6px 14px;white-space:nowrap}
.ai-resp{
  padding:8px 20px 0;
  font-size:12px;color:var(--ink-faint);
  background:var(--paper-warm);
  border-top:1px solid var(--border-light);
  line-height:1.7;
}

/* === QR GRID === */
.qr-card{
  border:1px solid var(--border-light);
  padding:12px;text-align:center;
  background:var(--paper);
  position:relative;overflow:hidden;
}
.qr-card::after{
  content:'';position:absolute;top:0;right:0;
  width:0;height:0;
  border-style:solid;border-width:0 12px 12px 0;
  border-color:transparent var(--border-light) transparent transparent;
}

/* === LOC BUILDER === */
.loc-box{
  background:var(--paper-warm);border:1px solid var(--border-light);
  border-left:3px solid var(--gold-light);
  padding:12px;margin-bottom:10px;
}

/* Scrollbar */
.body::-webkit-scrollbar{width:3px}
.body::-webkit-scrollbar-thumb{background:var(--border)}

/* Step header */
.step-hd{
  font-family:'Noto Serif TC',serif;
  font-size:13px;color:var(--ink);
  margin-bottom:12px;letter-spacing:0.06em;
  display:flex;align-items:center;gap:8px;
}
.step-hd::before{
  content:attr(data-step);
  width:22px;height:22px;border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;color:var(--gold);flex-shrink:0;
}

/* ── MOBILE BOTTOM NAV ──────────────────────────────────────────────── */
.mob-nav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;
  background:var(--paper-warm);
  border-top:1px solid var(--border);
  z-index:200;
  padding-bottom:env(safe-area-inset-bottom);
}
.mob-nav-inner{display:flex;align-items:stretch}
.mob-nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 2px 6px;
  cursor:pointer;color:var(--ink-faint);
  font-size:9px;letter-spacing:0.06em;
  border:none;background:none;font-family:'Noto Sans TC',sans-serif;
  position:relative;transition:color 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.mob-nav-btn .ico{font-size:18px;margin-bottom:2px;line-height:1}
.mob-nav-btn.on{color:var(--gold)}
.mob-nav-btn.on::after{
  content:'';position:absolute;top:0;left:20%;right:20%;
  height:2px;background:var(--gold);
}
.mob-topbar-menu{
  display:none;
  background:none;border:none;cursor:pointer;
  padding:8px;color:var(--ink);font-size:20px;
  -webkit-tap-highlight-color:transparent;
}

/* ── MOBILE SLIDE DRAWER ────────────────────────────────────────────── */
.drawer-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(28,20,16,0.45);z-index:300;
}
.drawer-overlay.open{display:block}
.drawer{
  position:fixed;left:0;top:0;bottom:0;width:220px;
  background:var(--paper-warm);border-right:1px solid var(--border);
  z-index:400;transform:translateX(-100%);
  transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.drawer.open{transform:translateX(0)}

/* ── RESPONSIVE OVERRIDES ───────────────────────────────────────────── */
@media (max-width: 640px){
  html,body{overflow:auto}
  .app{flex-direction:column;height:auto;min-height:100dvh}
  .sb{display:none}          /* hide desktop sidebar */
  .mob-nav{display:flex}
  .mob-topbar-menu{display:flex;align-items:center;justify-content:center}
  .scan-btn{display:none}    /* hide desktop scan button on mobile */

  .main{height:auto;min-height:calc(100dvh - 58px)}
  .topbar{padding:10px 14px}
  .tb-t{font-size:14px}
  .srch-wrap input{width:100px}

  .body{padding:12px;padding-bottom:80px}

  /* stats 2-col on mobile */
  .sts{grid-template-columns:1fr 1fr;gap:8px}
  .st-v{font-size:18px}

  /* tables → scroll on mobile */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tbl{min-width:500px}

  /* forms full-width on mobile */
  .fr{grid-template-columns:1fr}

  /* QR grid 2-col on mobile */
  .qr-grid-mobile{grid-template-columns:repeat(2,1fr) !important}

  /* step cards stacked */
  .tg{grid-template-columns:1fr 1fr}

  /* item grid 1-col */
  .item-grid-mobile{grid-template-columns:1fr !important}

  /* AI bar compact */
  .ai-bar{padding:6px 12px}
  .ai-bar input{font-size:12px}
  .ai-bar button{padding:6px 10px;font-size:11px}
  .ai-resp{padding:6px 12px 0;font-size:11px}

  /* modal full-screen on mobile */
  #qrModal > div{width:calc(100vw - 32px) !important;max-width:340px}
}

@media (max-width: 400px){
  .sts{grid-template-columns:1fr 1fr}
  .tg{grid-template-columns:1fr}
  .fr{grid-template-columns:1fr}
}

/* === CAMERA SCANNER === */
.cam-overlay{
  position:fixed;inset:0;background:rgba(28,20,16,0.88);
  z-index:2000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.cam-box{
  position:relative;width:min(320px,85vw);
  background:#000;border:2px solid var(--gold);
}
.cam-box video{width:100%;display:block;max-height:320px;object-fit:cover}
.cam-corner{position:absolute;width:20px;height:20px;border-color:var(--gold);border-style:solid}
.cam-corner.tl{top:-2px;left:-2px;border-width:2px 0 0 2px}
.cam-corner.tr{top:-2px;right:-2px;border-width:2px 2px 0 0}
.cam-corner.bl{bottom:-2px;left:-2px;border-width:0 0 2px 2px}
.cam-corner.br{bottom:-2px;right:-2px;border-width:0 2px 2px 0}
.cam-scan-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  animation:scanline 2s ease-in-out infinite;
}
@keyframes scanline{0%{top:10%}50%{top:85%}100%{top:10%}}
.cam-label{
  margin-top:14px;font-family:'Noto Serif TC',serif;
  font-size:13px;color:var(--paper);letter-spacing:0.12em;
  text-align:center;
}
.cam-hint{font-size:10px;color:var(--gold);margin-top:6px;letter-spacing:0.08em}
.cam-close{
  margin-top:18px;padding:8px 28px;
  font-size:12px;font-family:'Noto Sans TC',sans-serif;
  background:transparent;border:1px solid var(--border);
  color:var(--paper);cursor:pointer;letter-spacing:0.08em;
}
.cam-close:hover{background:var(--gold);border-color:var(--gold);color:#fff}
.cam-result{
  margin-top:12px;font-size:11px;color:var(--gold);
  letter-spacing:0.06em;min-height:18px;text-align:center;
}

/* === RESET CONFIRM === */
.reset-bar{
  display:flex;align-items:center;gap:10px;
  padding:7px 20px;
  background:rgba(139,32,32,0.07);
  border-top:1px solid rgba(139,32,32,0.15);
  font-size:10px;color:var(--red-seal);letter-spacing:0.06em;
}
.reset-bar button{
  font-size:10px;padding:3px 10px;
  border-color:rgba(139,32,32,0.4);color:var(--red-seal);
  margin-left:auto;
}
.reset-bar button:hover{background:var(--red-seal);border-color:var(--red-seal);color:#fff}
/* storage badge */

<div class="app">

  <!-- MOBILE DRAWER OVERLAY -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

  <!-- MOBILE SLIDE DRAWER -->

    <div class="sb-hd" style="padding:18px 16px 14px">
      <div class="sb-title">平安家園</div>
      <div class="sb-sub">活 動 物 品 手 帳</div>
      <div class="seal">庫存</div>
    </div>
    <div style="flex:1">
      <div class="nsh">選 單</div>
      <div class="nav on" id="drNav0" onclick="go('inv',this);closeDrawer()">庫 存 總 覽</div>
      <div class="nav" id="drNav1" onclick="go('scan',this);closeDrawer()">掃 描 出 入 庫</div>
      <div class="nav" id="drNav2" onclick="go('borrow',this);closeDrawer()">借 用 管 理</div>
      <div class="nav" id="drNav3" onclick="go('qr',this);closeDrawer()">品 項 QR Code</div>
      <div class="nav" id="drNav4" onclick="go('loc',this);closeDrawer()">位 置 管 理</div>
      <div class="nav" id="drNav5" onclick="go('rep',this);closeDrawer()">異 動 紀 錄</div>

        <button onclick="confirmReset()" style="font-size:9px;padding:3px 10px;border-color:rgba(139,32,32,0.35);color:var(--red-seal)">重 設 系 統</button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR (desktop) -->

    <div class="sb-hd">
      <div class="sb-title">平安家園</div>

      <div class="seal">庫存</div>

    <div style="flex:1">
      <div class="nsh">選 單</div>

      <div class="nav" onclick="go('scan',this)">掃 描 出 入 庫</div>
      <div class="nav" onclick="go('borrow',this)">借 用 管 理</div>
      <div class="nav" onclick="go('qr',this)">品 項 QR Code</div>
      <div class="nav" onclick="go('loc',this)">位 置 管 理</div>
      <div class="nav" onclick="go('rep',this)">異 動 紀 錄</div>
    </div>
    <div class="sb-foot">
      <div class="stor-badge" id="syncBadge"><span class="stor-dot"></span>連線中…</div>
      <div class="sb-foot-txt" style="margin-top:4px">Powered by Claude</div>
      <div class="sb-foot-ver">嘉義縣平安家園多元關懷協會 · 2026</div>

        <button onclick="confirmReset()" style="font-size:9px;padding:3px 10px;border-color:rgba(139,32,32,0.35);color:var(--red-seal)">重 設 系 統</button>

    </div>

// ── 從 Google Sheets 讀取 ────────────────────────────────────────────────
// ── Sheets 日期序列轉換工具 ─────────────────────────────────────────────────
// Google Sheets 儲存日期為「從 1899-12-30 起算的天數」序列數
// 需轉換為人可讀字串，避免顯示 1899-xx-xx
function sheetSerialToDate(serial){
  // serial: 例如 45784 → 2025-xx-xx
  const d=new Date((serial-25569)*86400*1000);
  return d;
}
function fixSheetDate(val){
  if(!val && val!==0) return '';
  if(typeof val==='number'){
    const d=sheetSerialToDate(val);
    return d.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'-');
  }
  return String(val);
}
function fixSheetTime(dateVal, timeVal){
  // timeVal from Sheets may be a decimal fraction of a day (e.g. 0.5625 = 13:30)
  // or a full serial (date+time combined as float)
  if(timeVal!==undefined && timeVal!==null && timeVal!==''){
    if(typeof timeVal==='number'){
      // If it's a full datetime serial (>1), extract time portion
      const frac = timeVal % 1;
      const totalMin=Math.round(frac*1440);
      const h=Math.floor(totalMin/60).toString().padStart(2,'0');
      const m=(totalMin%60).toString().padStart(2,'0');
      return `${h}:${m}`;
    }
    return String(timeVal);
  }
  // fallback: parse from dateVal if it's a float serial
  if(typeof dateVal==='number' && dateVal%1!==0){
    const frac=dateVal%1;
    const totalMin=Math.round(frac*1440);
    const h=Math.floor(totalMin/60).toString().padStart(2,'0');
    const m=(totalMin%60).toString().padStart(2,'0');
    return `${h}:${m}`;
  }
  return String(timeVal||'');
}

async function gasLoad(){
  try{
    const r=await fetch(GAS_URL+'?action=getAll');
    const d=await r.json();
    if(!d.ok) throw new Error(d.error);

    // inv：若 Sheets 有資料就用，否則用預設值（首次使用）
    if(d.data.inv && d.data.inv.length>0){
      inv=d.data.inv.map(row=>({
        ...row,
        id:   Number(row.id),
        qty:  Number(row.qty),
        min:  Number(row.min),
        con:  row.con===true||row.con==='true'||row.con==='TRUE',
        loc:  typeof row.loc==='string'?JSON.parse(row.loc):row.loc||{}
      }));
    } else {
      // 首次：把預設值寫入 Sheets
      await gasSave();
    }

    if(d.data.logs && d.data.logs.length>0){
      logs=d.data.logs.map(row=>({
        ...row,
        qty:  Number(row.qty),
        date: fixSheetDate(row.date),
        time: fixSheetTime(row.date, row.time)
      }));
    }

    if(d.data.brws && d.data.brws.length>0){
      brws=d.data.brws.map(row=>({
        ...row,
        id:  Number(row.id),
        iid: Number(row.iid),
        qty: Number(row.qty),
        ret: row.ret===true||row.ret==='true'||row.ret==='TRUE',
        due: fixSheetDate(row.due)
      }));
      // rebuild bseq
      bseq=brws.reduce((m,b)=>Math.max(m,b.id),0)+1;
    }

    showSaved();
  }catch(e){
    console.error('gasLoad error',e);
    showSaveErr();
    // 載入失敗仍可使用預設值，但提示用戶
    const badge=document.getElementById('syncBadge');
    if(badge)badge.title='無法連線到 Google Sheets，目前使用本機預設值';
  }
}

// ── 寫回 Google Sheets ───────────────────────────────────────────────────
async function gasSave(){
  showSaving();
  try{
    const body={
      action:'saveAll',
      data:{
        inv:  inv.map(i=>({...i, loc:JSON.stringify(i.loc)})),
        logs: logs,
        brws: brws
      }
    };
    const r=await fetch(GAS_URL,{
      method:'POST',
      body:JSON.stringify(body)
    });
    const d=await r.json();
    if(!d.ok) throw new Error(d.error);
    showSaved();
  }catch(e){
    console.error('gasSave error',e);
    showSaveErr();
  }
}

  inv.forEach(i=>{ i.qty=30; });

  brws=[];
  bseq=1;
  await gasSave();
  location.reload();
}

// withAuth(onSuccess, title, hint)
// Shows password modal; calls onSuccess() if correct.
function withAuth(onSuccess, title='需要密碼驗證', hint=''){
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(28,20,16,0.72);z-index:3500;display:flex;align-items:center;justify-content:center';
  overlay.id='authOverlay';
  overlay.innerHTML=`
    <div style="background:#f7f3ec;border:1px solid #c8bfaf;border-left:4px solid var(--gold);padding:24px 28px;max-width:320px;width:90%">
      <div style="font-family:'Noto Serif TC',serif;font-size:14px;color:#1c1410;margin-bottom:6px;letter-spacing:0.1em">🔒 ${title}</div>
      ${hint?`<div style="font-size:11px;color:#6b5a4e;margin-bottom:14px">${hint}</div>`:'<div style="margin-bottom:14px"></div>'}
      <div style="margin-bottom:14px">
        <label style="font-size:11px;color:#6b5a4e;letter-spacing:0.06em;display:block;margin-bottom:4px">請 輸 入 管 理 密 碼</label>
        <input id="authPwdInput" type="password" inputmode="numeric"
          placeholder="••••"
          style="width:100%;padding:9px 12px;border:1px solid #c8bfaf;background:#fff;
                 font-size:18px;letter-spacing:0.3em;text-align:center;color:#1c1410;
                 font-family:'Noto Serif TC',serif;outline:none"
          onkeydown="if(event.key==='Enter')authSubmit()">
      </div>
      <div id="authErr" style="font-size:11px;color:#8b2020;min-height:16px;margin-bottom:10px;letter-spacing:0.04em"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button onclick="document.getElementById('authOverlay').remove()" style="font-size:11px;padding:7px 16px">取 消</button>
        <button class="btn-primary" onclick="authSubmit()" style="font-size:11px;padding:7px 18px">確 認</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  // Store callback
  overlay._onSuccess=onSuccess;
  setTimeout(()=>{const i=document.getElementById('authPwdInput');if(i)i.focus();},80);
}
function authSubmit(){
  const input=document.getElementById('authPwdInput');
  const err=document.getElementById('authErr');
  if(!input)return;
  if(input.value===getPwd()){
    const overlay=document.getElementById('authOverlay');
    const cb=overlay?overlay._onSuccess:null;
    if(overlay)overlay.remove();
    if(cb)cb();
  } else {
    if(err)err.textContent='密碼錯誤，請重試';
    input.value='';
    input.focus();
    input.style.borderColor='#8b2020';
    setTimeout(()=>{if(input)input.style.borderColor='#c8bfaf';},1000);
  }
}

// ── Camera QR Scanner ──────────────────────────────────────────────────────
let camStream=null,camAnim=null;

function openCam(){
  // Build overlay
  const overlay=document.createElement('div');
  overlay.className='cam-overlay';
  overlay.id='camOverlay';
  overlay.innerHTML=`
    <div class="cam-box" id="camBox">
      <video id="camVid" autoplay muted playsinline style="width:100%;display:block;max-height:320px;object-fit:cover"></video>
      <canvas id="camCanvas" style="display:none"></canvas>
      <div class="cam-scan-line"></div>
      <div class="cam-corner tl"></div><div class="cam-corner tr"></div>
      <div class="cam-corner bl"></div><div class="cam-corner br"></div>
    </div>
    <div class="cam-label">將 QR Code 對準框內</div>
    <div class="cam-hint">系統將自動辨識並跳轉</div>
    <div class="cam-result" id="camResult">掃描中…</div>
    <button class="cam-close" onclick="closeCam()">關 閉 相 機</button>`;
  document.body.appendChild(overlay);

  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}
  }).then(stream=>{
    camStream=stream;
    const vid=document.getElementById('camVid');
    vid.srcObject=stream;
    vid.play();
    vid.addEventListener('loadedmetadata',()=>startScanLoop(vid));
  }).catch(err=>{
    const r=document.getElementById('camResult');
    if(r){
      if(err.name==='NotAllowedError')r.textContent='⚠ 請允許相機權限後重試';
      else if(err.name==='NotFoundError')r.textContent='⚠ 找不到相機裝置';
      else r.textContent='⚠ 無法開啟相機：'+err.message;
    }
  });
}

function startScanLoop(vid){
  const canvas=document.getElementById('camCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let lastCode='',lastTime=0;

  function tick(){
    if(!document.getElementById('camOverlay')){cancelAnimationFrame(camAnim);return}
    if(vid.readyState===vid.HAVE_ENOUGH_DATA){
      canvas.width=vid.videoWidth;
      canvas.height=vid.videoHeight;
      ctx.drawImage(vid,0,0,canvas.width,canvas.height);
      const img=ctx.getImageData(0,0,canvas.width,canvas.height);
      try{
        const code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
        if(code){
          const now=Date.now();
          if(code.data!==lastCode||now-lastTime>3000){
            lastCode=code.data;lastTime=now;
            handleQRResult(code.data);
          }
        }
      }catch(e){}
    }
    camAnim=requestAnimationFrame(tick);
  }
  camAnim=requestAnimationFrame(tick);
}

function handleQRResult(raw){
  // QR format: ITEM:id:name:cat:nature:location
  const r=document.getElementById('camResult');
  const parts=raw.split(':');
  if(parts.length>=3&&parts[0]==='ITEM'){
    const id=parseInt(parts[1]);
    const found=inv.find(i=>i.id===id);
    if(found){
      if(r)r.textContent='✓ 掃到：'+found.nm+'　跳轉中…';
      // Flash border green
      const box=document.getElementById('camBox');
      if(box)box.style.borderColor='#2a6b5e';
      setTimeout(()=>{closeCam();selI(id)},700);
      return;
    }
  }
  // Try to match by name if id not found
  const nameMatch=inv.find(i=>raw.includes(i.nm));
  if(nameMatch){
    if(r)r.textContent='✓ 掃到：'+nameMatch.nm+'　跳轉中…';
    setTimeout(()=>{closeCam();selI(nameMatch.id)},700);
    return;
  }
  if(r)r.textContent='⚠ 無法辨識此 QR Code，請重試';
}

function closeCam(){
  cancelAnimationFrame(camAnim);
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  const o=document.getElementById('camOverlay');
  if(o)o.remove();
}

function sim(){selI(inv[Math.floor(Math.random()*inv.length)].id)}
function selI(id){sd.item=inv.find(i=>i.id===id);ss=1;step()}
function selO(op){
  if(op==='入庫'){
    withAuth(()=>{sd.op=op;ss=2;step();},'入 庫 驗 證','入庫作業需要管理員授權');
  } else {
    sd.op=op;ss=2;step();
  }
}
function cfm(){
  const u=(document.getElementById('sU').value||'').trim(),q=parseInt(document.getElementById('sQ').value)||0,pur=document.getElementById('sP').value,due=sd.op==='借用'&&document.getElementById('sD')?document.getElementById('sD').value:'',er=document.getElementById('er');
  if(!u){er.textContent='請填寫人員姓名';return}
  if(q<=0){er.textContent='數量須大於 0';return}
  const it=sd.item;
  if(sd.op!=='入庫'&&q>it.qty){er.textContent=`庫存不足，目前僅剩 ${it.qty} ${it.u}`;return}
  if(sd.op==='入庫')it.qty+=q;else it.qty-=q;
  sd.qty=q;sd.user=u;sd.pur=pur;sd.due=due;
  if(sd.op==='借用')brws.push({id:bseq++,iid:it.id,nm:it.nm,qty:q,user:u,pur,due,date:tdy(),time:ntm(),ret:false,retD:null});
  logs.push({type:sd.op,nm:it.nm,qty:q,user:u,pur,due:due||'',loc:ls(it.loc),date:tdy(),time:ntm()});
  gasSave();
  ss=3;step();
}

  return `<div class="loc-box">
    <div style="font-size:10px;color:#b5832a;letter-spacing:0.12em;margin-bottom:8px">儲 存 位 置</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div><label class="fl">場 所</label><select id="${px}R" onchange="upP('${px}')"><option value="">選擇</option>${ROOMS.map(r=>`<option${rv===r?' selected':''}>${r}</option>`).join('')}</select></div>
      <div><label class="fl">架 位</label><select id="${px}K" onchange="upP('${px}')"><option value="">選擇</option>${RACKS.map(r=>`<option${rkv===r?' selected':''}>${r}</option>`).join('')}</select></div>
      <div><label class="fl">層 數</label><select id="${px}L" onchange="upP('${px}')"><option value="">選擇</option>${LEVS.map(r=>`<option${lv===r?' selected':''}>${r}</option>`).join('')}</select></div>
    </div>
    <div style="font-size:11px;color:#1c1410;margin-top:8px;padding:5px 8px;background:#f7f3ec;border:1px solid #ddd6c8;letter-spacing:0.04em" id="${px}Pv">${ls(loc)||'尚 未 設 定'}</div>
  </div>`;
}
function upP(p){const r=document.getElementById(p+'R').value,k=document.getElementById(p+'K').value,lv=document.getElementById(p+'L').value;document.getElementById(p+'Pv').textContent=[r,k,lv].filter(Boolean).join(' › ')||'尚未設定';}

    <th style="width:17%">品 項</th><th style="width:7%">數 量</th>

// Mobile nav mapping: pg → bottom-nav button index (only 5 tabs; loc maps to borrow tab)
const MOB_IDX={inv:0,scan:1,borrow:2,qr:3,loc:2,rep:4};
const DSK_IDX={inv:0,scan:1,borrow:2,qr:3,loc:4,rep:5};

function go(pg,el){
  // Desktop sidebar
  document.querySelectorAll('.sb .nav,.drawer .nav').forEach(n=>n.classList.remove('on'));
  if(el&&el.closest('.sb')){el.classList.add('on')}
  else if(el&&el.closest('.drawer')){el.classList.add('on')}
  else{
    const di=DSK_IDX[pg]??0;
    document.querySelectorAll('.sb .nav')[di]?.classList.add('on');
    document.querySelectorAll('.drawer .nav')[di]?.classList.add('on');
  }
  // Mobile bottom nav
  document.querySelectorAll('.mob-nav-btn').forEach(b=>b.classList.remove('on'));
  const mi=MOB_IDX[pg]??0;
  document.querySelectorAll('.mob-nav-btn')[mi]?.classList.add('on');

  document.getElementById('pgt').textContent=ttmap[pg]||pg;
  document.getElementById('srchWrap').style.display=pg==='inv'?'flex':'none';
  // Scroll to top on page change (mobile)
  const body=document.getElementById('pg');
  if(body)body.scrollTop=0;
  (pgmap[pg]||pgInv)();
}

// ── Drawer ────────────────────────────────────────────────────────────────
function openDrawer(){
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.body.style.overflow='';
}
// Swipe-to-close drawer
(()=>{
  let sx=0;
  document.getElementById('drawer').addEventListener('touchstart',e=>{sx=e.touches[0].clientX},{passive:true});
  document.getElementById('drawer').addEventListener('touchend',e=>{
    if(e.changedTouches[0].clientX - sx < -50) closeDrawer();
  },{passive:true});
})();

async function askAI(){
  const q=document.getElementById('aiq').value.trim();if(!q)return;
  const wrap=document.getElementById('aiRespWrap'),txt=document.getElementById('aiRespTxt');
  wrap.style.display='block';txt.style.color='#6b5a4e';txt.style.fontStyle='italic';txt.textContent='Claude 思考中…';
  const snap=inv.map(i=>`${i.nm}（${i.cat}，${i.con?'消耗品':'非消耗品'}）：${i.qty}${i.u}，位置：${ls(i.loc)}`).join('；');
  const bsnap=brws.filter(b=>!b.ret).map(b=>`${b.nm} ${b.qty}，借用人：${b.user}，預定歸還：${b.due||'未設定'}${ovd(b.due)?'【逾期】':''}`).join('；')||'無';
  try{
    // ── 透過 GAS 代理轉發，避免 API Key 暴露於前端 ──
    const r=await fetch(GAS_URL,{
      method:'POST',
      body:JSON.stringify({
        action:'askClaude',
        prompt:`你是長照站活動物品庫存助理。庫存：${snap}。借用中：${bsnap}。請用繁體中文簡短回答（2-3句）：${q}`
      })
    });
    const d=await r.json();
    txt.style.fontStyle='normal';txt.style.color='#1c1410';
    if(d.ok){
      txt.textContent=d.reply;
    } else {
      txt.style.color='#8b2020';
      txt.textContent='查詢失敗：'+(d.error||'請稍後再試');
    }
  }catch(e){txt.style.color='#8b2020';txt.textContent='連線失敗，請稍後再試。'}
  document.getElementById('aiq').value='';
}

// ── Startup: render immediately with defaults, then refresh from Sheets ───
// 檢查 URL 參數：手機掃描 QR Code 後帶入 ?item=ID，直接跳出入庫流程
function checkURLItem(){
  const params=new URLSearchParams(window.location.search);
  const itemId=params.get('item');
  if(itemId){
    const id=parseInt(itemId);
    const found=inv.find(i=>i.id===id);
    if(found){
      go('scan',null);
      setTimeout(()=>selI(id),80);
      return true;
    }
  }
  return false;
}

go('inv', null);   // 立即顯示預設畫面，不等待網路

// 背景從 Google Sheets 載入，完成後靜默刷新當前頁
gasLoad().then(()=>{
  if(!checkURLItem()) go('inv', null);
});
